<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substituidor de URL Magalu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            margin-top: 0;
            color: #0086ff; 
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #0086ff;
            color: white;
            border: none;
            padding: 12px 20px;
            margin-top: 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #006bbd;
        }
        /* Estilo opcional para destacar quando der erro */
        .erro {
            color: #d93025 !important;
            border-color: #d93025 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Formatador de URL Magalu</h2>
        
        <label for="inputUrl">Cole o endere&ccedil;o original aqui:</label>
        <input type="text" id="inputUrl" placeholder="Ex: https://www.magazineluiza.com.br/_next/data/.../bistequeiras/..." />

        <button onclick="formatarUrl()">Substituir Vari&aacute;veis</button>

        <label for="outputUrl">Endere&ccedil;o modificado:</label>
        <input type="text" id="outputUrl" readonly placeholder="O resultado aparecer&aacute; aqui..." />
    </div>

    <script>
        function formatarUrl() {
            let url = document.getElementById('inputUrl').value;
            let outputField = document.getElementById('outputUrl');

            // Limpa o estilo de erro anterior (se houver)
            outputField.classList.remove('erro');

            if (url.trim() === "") {
                alert("Por favor, insira uma URL v\u00e1lida.");
                return;
            }

            // Verifica se a condição de substituição (existência de _next/data/) é atendida
            if (!url.includes('_next/data/')) {
                outputField.value = "URL Inválida. Verificar DevTools.";
                outputField.classList.add('erro'); // Adiciona classe CSS para deixar o texto vermelho
                return;
            }

            // Substitui o bloco após _next/data/
            let urlModificada = url.replace(/_next\/data\/[^\/]+\//, '_next/data/[VARIAVEL(1)]/');
            
            // Mantém a substituição do número da página
            urlModificada = urlModificada.replace(/page=\d+/, 'page=#1');

            outputField.value = urlModificada;
            outputField.select();
        }
    </script>

</body>
</html>
